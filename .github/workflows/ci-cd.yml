name: CI/CD DevSecOps & GitOps Pipeline

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  push:
    branches:
      - main
    paths-ignore:
      - 'helm/oke-app/values.yaml' # Prevent infinite build loops when pipeline commits back
      - 'README.md'
      - 'terraform/**'
      - '.gitignore'

permissions:
  contents: write      # Required for committing image tag back to git
  pull-requests: write # Required to post status checks on PRs
  id-token: write      # Required for GitHub App token exchange

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Lint & Test — runs on BOTH PRs and pushes to main
  # ─────────────────────────────────────────────────────────────
  lint-and-test:
    if: github.actor != 'OKE-App-Automation[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: |
          cd app
          npm install --no-audit

      - name: Run JavaScript Syntax Check
        run: |
          node --check app/app.js

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run Helm Lint
        run: |
          helm lint helm/oke-app

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Security scan on PR — build image and scan only, no push
  # ─────────────────────────────────────────────────────────────
  trivy-scan-pr:
    if: github.event_name == 'pull_request'
    needs: lint-and-test
    runs-on: ubuntu-latest
    env:
      REGISTRY: uk-london-1.ocir.io
      NAMESPACE: lryo68b31h2j
      REPOSITORY: oke-app
      IMAGE_TAG: pr-${{ github.event.pull_request.number }}-${{ github.sha }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (PR check — no push)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          trivyignores: .trivyignore

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Build, scan, push, deploy — only on merge to main
  # ─────────────────────────────────────────────────────────────
  build-scan-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'OKE-App-Automation[bot]'
    needs: lint-and-test
    runs-on: ubuntu-latest
    env:
      REGISTRY: uk-london-1.ocir.io
      NAMESPACE: lryo68b31h2j
      REPOSITORY: oke-app
      IMAGE_TAG: sha-${{ github.sha }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image locally
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          trivyignores: .trivyignore

      - name: Log in to OCI Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.OCI_REGISTRY_USER }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Push Docker Image to OCI Registry
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.REPOSITORY }}:latest

  # ─────────────────────────────────────────────────────────────
  # JOB 4: GitOps tag update — only after successful push to main
  # ─────────────────────────────────────────────────────────────
  gitops-deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'OKE-App-Automation[bot]'
    needs: build-scan-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: sha-${{ github.sha }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.OKE_APP_AUTOMATION_APPID }}
          private-key: ${{ secrets.OKE_APP_AUTOMATION_SECRET }}

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update Helm Chart Image Tag
        run: |
          yq -i ".image.tag = \"${{ env.IMAGE_TAG }}\"" helm/oke-app/values.yaml

      - name: Commit and Push Image Tag Update
        run: |
          git config --global user.name "OKE-App-Automation[bot]"
          git config --global user.email "bot@oke-app.local"
          git add helm/oke-app/values.yaml
          git commit -m "chore(gitops): update image tag to ${{ env.IMAGE_TAG }} [skip ci]"
          git push origin main

  # ─────────────────────────────────────────────────────────────
  # JOB 5: Playwright Test after deployment
  # ─────────────────────────────────────────────────────────────
  playwright-test:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'OKE-App-Automation[bot]'
    needs: gitops-deploy
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
        
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Playwright Browsers
      run: |
        cd tests
        npx playwright install --with-deps

    - name: Install Dependencies
      run: npm i -D @playwright/test

    - name: Wait For ArgoCD
      run: sleep 120

    - name: Run Playwright tests
      run: npx playwright test
      
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: tests/playwright-report/
        retention-days: 3