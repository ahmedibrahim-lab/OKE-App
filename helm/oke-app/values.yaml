# Default values for oke-app.
# Declare variables to be passed into your templates.

replicaCount: 2
image:
  repository: uk-london-1.ocir.io/lryo68b31h2j/oke-app
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "sha-28fb54564cde725da2470c032afa4aa2756bb27e"
# Image pull secret needed to pull the image from private OCI Container Registry
imagePullSecrets:
  - name: ocir-secret
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""
podAnnotations: {}
podLabels: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
service:
  type: LoadBalancer
  port: 80
  targetPort: 5000
ingress:
  enabled: false
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
# Liveness/Readiness probes pointing to /api/info
livenessProbe:
  httpGet:
    path: /api/info
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /api/info
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
autoscaling:
  enabled: false
volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}
# Gateway API routing (disabled by default)
httpRoute:
  enabled: false
